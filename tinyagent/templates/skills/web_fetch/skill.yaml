name: web_fetch
version: 1.0.0
description: Fetch URL and extract readable content
tool: tool.py
config:
  max_chars: 50000
  proxy: null
schema:
  name: web_fetch
  description: Fetch URL and extract readable content (HTML → markdown/text).
  input_schema:
    type: object
    properties:
      url:
        type: string
        description: URL to fetch
      extractMode:
        type: string
        enum: ["markdown", "text"]
        default: "markdown"
      maxChars:
        type: integer
        minimum: 100
    required:
      - url
